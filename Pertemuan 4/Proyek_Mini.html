<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Proyek Mini (Kalkulator Biaya Produksi)</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .bg-pink {
            background-color: #ff69b4;
        }

        .btn-pink {
            background-color: #ff69b4;
            color: white;
            border: none;
        }

        .btn-pink:hover {
            background-color: #ff4fa3;
            color: white;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="bg-pink text-white py-4 shadow">
        <div class="container text-center">
            <h1 class="mb-1">Proyek Mini - Kalkulator Biaya Produksi</h1>
            <p class="mb-0">Dibuat oleh Ardita Natalia (23051430022)</p>
        </div>
    </header>

    <!-- MAIN -->
    <main class="container my-5">

        <!-- FORM INPUT -->
        <section class="mb-5">
            <article class="card shadow-sm">
                <div class="card-body">

                    <h2 class="h4 fw-bold text-center mb-4">Input Data Produksi</h2>

                    <form id="formProduksi">

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Biaya Bahan Baku (Rp)</label>
                                <input type="number" class="form-control" id="bahanBaku" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Biaya Tenaga Kerja (Rp)</label>
                                <input type="number" class="form-control" id="tenagaKerja" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Biaya Overhead (Rp)</label>
                                <input type="number" class="form-control" id="overhead" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Jumlah Produksi (Unit)</label>
                                <input type="number" class="form-control" id="jumlahProduksi" required>
                            </div>

                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-pink w-100">
                                Hitung Biaya
                            </button>
                        </div>

                    </form>

                </div>
            </article>
        </section>

        <!-- HASIL -->
        <section>
            <article class="card shadow-sm">
                <div class="card-body text-center">

                    <h2 class="h4 fw-bold mb-3">Hasil Perhitungan</h2>

                    <p class="text-muted">
                        Semua hasil perhitungan akan ditampilkan pada bagian ini,
                        dan informasi yang sama juga dapat dilihat melalui console browser.
                    </p>

                    <div id="hasilOutput" class="fw-semibold fs-5"></div>

                </div>
            </article>
        </section>

    </main>

    <!-- JAVASCRIPT -->
    <script src="Proyek_Mini.js"></script>

</body>

</html>
