<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Integrasi API Data Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <!-- HEADER -->
    <div class="text-center text-white py-4 mb-4 rounded"
        style="background: linear-gradient(to right, #6baed6, #4292c6);">
        <h2 class="fw-bold">LATIHAN 2 - FILTER DATA</h2>
        <p class="mb-1">ARDITA NATALIA</p>
        <p>NIM: 23051430022</p>
    </div>

    <h2 class="mb-4">Data Karyawan (Dari Server)</h2>

    <!-- BUTTON ATAS -->
    <div class="d-flex gap-2 mb-3">
        <button id="btnLoad" class="btn btn-primary">Muat Data</button>
        <button id="btnTambah" class="btn btn-success">Tambah Karyawan</button>
    </div>

    <!-- FILTER SECTION (RAPI & FULL WIDTH) -->
    <div class="card p-3 mb-3 shadow-sm">
        <div class="row g-2">

            <!-- INPUT -->
            <div class="col-md-6">
                <input 
                    type="text" 
                    id="inputHuruf" 
                    class="form-control" 
                    placeholder="🔍 Masukkan huruf (misal: s, a, o)">
            </div>

            <!-- FILTER -->
            <div class="col-md-3 d-grid">
                <button id="btnFilterHuruf" class="btn btn-primary">
                    Filter Berdasarkan Huruf
                </button>
            </div>

            <!-- RESET -->
            <div class="col-md-3 d-grid">
                <button id="btnReset" class="btn btn-outline-secondary">
                    Tampilkan Semua
                </button>
            </div>

        </div>

        <!-- LOADING -->
        <div class="text-center mt-3">
            <div id="loading" class="spinner-border text-primary d-none" role="status"></div>
        </div>
    </div>

    <!-- DATA -->
    <div class="row" id="containerKaryawan"></div>

    <script src="Latihan_2.js"></script>

</body>
</html>
