<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Integrasi API Data Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

    <!-- HEADER -->
    <div class="text-center text-white py-4 mb-4" style="background: linear-gradient(to right, #6baed6, #4292c6);">
        <h2>LATIHAN 2 - FILTER DATA</h2>
        <p class="mb-1">ARDITA NATALIA</p>
        <p>NIM: 23051430022</p>
    </div>

    <h2 class="mb-4">Data Karyawan (Dari Server)</h2>

    <div class="mb-3">
        <button id="btnLoad" class="btn btn-primary">Muat Data dari API</button>
        <button id="btnTambah" class="btn btn-success">Tambah Karyawan Baru</button>

        <!-- FILTER INPUT -->
        <input type="text" id="inputHuruf" class="form-control mt-2" placeholder="Masukkan huruf (misal: s, a, o)">
        <button id="btnFilterHuruf" class="btn btn-info mt-2">Filter Berdasarkan Huruf</button>
        <button id="btnReset" class="btn btn-secondary mt-2">Tampilkan Semua</button>

        <div id="loading" class="spinner-border text-primary d-none mt-2" role="status"></div>
    </div>

    <div class="row" id="containerKaryawan"></div>

    <script src="Latihan_2.js"></script>

</body>
</html>
