<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Mini Project - Laporan Insiden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f6fd;
        }
        .header-banner {
            background: linear-gradient(135deg, #1565c0 0%, #1976d2 50%, #42a5f5 100%);
            padding: 2.5rem 2rem;
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }
        .header-banner h2 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .header-banner p {
            margin: 0;
            opacity: 0.85;
            font-size: 15px;
        }
        .header-banner .nim {
            opacity: 0.65;
            font-size: 13px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            color: #0d47a1;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.25rem;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: #1976d2;
            border-radius: 2px;
        }
        .btn-muat {
            background: #1976d2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(25,118,210,0.35);
            transition: background 0.2s;
        }
        .btn-muat:hover { background: #1565c0; }
        .btn-tambah {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(46,125,50,0.35);
            transition: background 0.2s;
        }
        .btn-tambah:hover { background: #1b5e20; }
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .filter-bar input {
            padding: 9px 14px;
            border: 1.5px solid #90caf9;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            background: #fff;
            min-width: 220px;
            transition: border 0.2s;
        }
        .filter-bar input:focus { border-color: #1976d2; }
        .btn-filter {
            background: #00838f;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-filter:hover { background: #006064; }
        .btn-reset {
            background: #546e7a;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset:hover { background: #37474f; }
        .card {
            border-radius: 14px !important;
            border: 0.5px solid #bbdefb !important;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(25,118,210,0.15) !important;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #1976d2, #42a5f5);
        }
        .card-body { padding-top: 1.2rem; }
        .badge-tiket {
            font-size: 11px;
            font-weight: 600;
            color: #1976d2;
            background: #e3f2fd;
            border-radius: 20px;
            padding: 3px 10px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 700;
            color: #0d47a1;
            margin-bottom: 6px;
            text-transform: capitalize;
        }
        .card-text {
            font-size: 13px;
            color: #546e7a;
            line-height: 1.8;
        }
        .btn-tindak {
            width: 100%;
            padding: 9px;
            background: transparent;
            border: 1.5px solid #1976d2;
            border-radius: 8px;
            color: #1976d2;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            margin-top: 12px;
        }
        .btn-tindak:hover { background: #1976d2; color: white; }
    </style>
</head>
<body>

    <div class="header-banner">
        <h2>TUGAS PROYEK MINI — INTEGRASI DATA PRODUKSI</h2>
        <p>Ardita Natalia</p>
        <p class="nim">NIM: 23051430022</p>
    </div>

    <div class="container">
        <div class="section-title">Laporan Insiden &amp; Data Karyawan</div>

        <div class="mb-3 d-flex gap-2 flex-wrap">
            <button class="btn-muat" id="btnLoad">&#8681; Muat Data dari API</button>
            <button class="btn-tambah" id="btnTambah">+ Tambah Karyawan Baru</button>
        </div>

        <div class="filter-bar">
            <input type="text" id="inputHuruf" placeholder="Masukkan huruf (misal: s, a, o)" maxlength="5">
            <button class="btn-filter" id="btnFilter">&#9906; Filter Berdasarkan Huruf</button>
            <button class="btn-reset" id="btnTampilkan">Tampilkan Semua</button>
        </div>

        <div class="row" id="containerInsiden"></div>
    </div>

    <script src="Proyek_Mini.js"></script>
</body>
</html>
