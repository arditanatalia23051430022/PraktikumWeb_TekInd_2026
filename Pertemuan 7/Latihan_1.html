<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Produksi Harian</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        header {
            background: linear-gradient(to right, #89CFF0, #5DADE2);
            color: white;
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
        }
        header h2 {
            margin-bottom: 10px;
            font-weight: bold;
        }
        header p {
            margin: 3px 0;
        }
    </style>
</head>

<body>

    <!-- ================= HEADER ================= -->
    <header>
        <h2>Latihan 1 - Filter Data</h2>
        <p>Ardita Natalia</p>
        <p>NIM: 23051430022</p>
    </header>

    <div class="container">
        <div class="row">

            <!-- ================= FORM INPUT ================= -->
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header text-center fw-bold">
                        Input Data Produksi
                    </div>

                    <div class="card-body">
                        <form id="formProduksi">

                            <div class="mb-3">
                                <label class="form-label">Tanggal</label>
                                <input type="date" id="tanggal" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Nama Operator</label>
                                <input type="text" id="operator" class="form-control" placeholder="Nama Lengkap" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Shift</label>
                                <select id="shift" class="form-select" required>
                                    <option value="">-- Pilih Shift --</option>
                                    <option value="Pagi">Pagi</option>
                                    <option value="Siang">Siang</option>
                                    <option value="Malam">Malam</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Jumlah Produksi (Unit)</label>
                                <input type="number" id="jumlah" class="form-control" min="1" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Simpan Log
                            </button>

                            <button type="button" id="btnHapusSemua" class="btn btn-danger w-100 mt-2">
                                Hapus Semua Data
                            </button>

                        </form>
                    </div>
                </div>
            </div>

            <!-- ================= TABEL DATA ================= -->
            <div class="col-md-8">
                <h3 class="mb-2">Riwayat Produksi</h3>

                <!-- INPUT FILTER -->
                <input 
                    type="text" 
                    id="cariOperator" 
                    class="form-control mb-3" 
                    placeholder="Cari Nama Operator..."
                >

                <table class="table table-bordered table-striped">
                    <thead class="table-dark text-center">
                        <tr>
                            <th>Tanggal</th>
                            <th>Operator</th>
                            <th>Shift</th>
                            <th>Jumlah</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>

                    <tbody id="tabelBody" class="text-center">
                        <!-- Data dari JS -->
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <!-- JS -->
    <script src="Latihan_1.js"></script>

</body>
</html>
